<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Traviss.org</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fugaz+One&family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/shared/theme.css" />
  <style>
    :root {
      --bg:           #0D1420;
      --surface:      #1E2A44;
      --border:       #2E3D5E;
      --text:         #F5E8D0;
      --text-muted:   #9A8E7A;
      --gold:         #E8743C;
      --gold-on-dark: #1E2A44;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo {
      font-family: 'Fugaz One', cursive;
      font-size: 32px;
      color: var(--gold);
      letter-spacing: 0.02em;
      margin-bottom: 8px;
    }

    .login-tagline {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .icon-strip {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
      opacity: 0.6;
    }
    .icon-item {
      width: 32px;
      height: 32px;
      background: rgba(232,201,106,0.1);
      border: 1px solid rgba(232,201,106,0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .login-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #fca5a5;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
      text-align: center;
    }
    .login-error.show { display: block; }

    .field { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 15px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: all 0.15s;
    }
    input:focus {
      border-color: var(--gold);
      background: rgba(255,255,255,0.05);
      box-shadow: 0 0 0 3px rgba(232, 201, 106, 0.1);
    }

    .login-btn {
      width: 100%;
      background: var(--gold);
      color: var(--gold-on-dark);
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
      transition: all 0.15s;
    }
    .login-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .login-btn:active { transform: translateY(0); }
    .login-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .footer-text {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Light mode overrides */
    body.light {
      --bg: #f7f4ee;
      --surface: #ffffff;
      --border: #ded6c8;
      --text: #27231f;
      --text-muted: #81776b;
      --gold: #9a7400;
      --gold-on-dark: #ffffff;
    }
    body.light .login-card { box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    body.light input { background: #fcfbf9; }
    body.light .icon-item { background: rgba(154,116,0,0.05); border-color: rgba(154,116,0,0.1); }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      <header class="login-header">
        <div class="icon-strip">
          <div class="icon-item">🎤</div>
          <div class="icon-item">🎙️</div>
          <div class="icon-item">🔍</div>
        </div>
        <div class="login-logo">Traviss.org</div>
        <div class="login-tagline">AI Playground</div>
      </header>

      <div class="login-error" id="err"></div>

      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" autocomplete="username"
               autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="Your username" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" />
      </div>

      <button class="login-btn" id="login-btn">Sign In</button>
      
      <p class="footer-text">Protected Access</p>
    </div>
  </div>

  <script src="/shared/theme.js"></script>
  <script>
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('err');
    const next = new URLSearchParams(location.search).get('next') || '/';

    function showErr(msg) { errEl.textContent = msg; errEl.classList.add('show'); }

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) { showErr('Enter your username and password.'); return; }
      
      btn.disabled = true; 
      btn.textContent = 'Signing in…'; 
      errEl.classList.remove('show');

      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const d = await r.json();
        if (r.ok) {
          window.location.href = next.startsWith('/') ? next : '/';
        } else {
          showErr(d.error || 'Login failed.');
          btn.disabled = false; btn.textContent = 'Sign In';
        }
      } catch {
        showErr('Network error — please try again.');
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    }

    btn.addEventListener('click', login);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
